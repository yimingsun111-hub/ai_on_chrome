<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Natural Language Browser Agent · 设置</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e8e8e8;
      --text: #1f1f1f;
      --text-muted: #8a8a8a;
      --accent: #2563eb;
      --danger: #dc2626;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      max-width: 520px;
      margin: 40px auto;
      padding: 0 20px;
      color: var(--text);
      background: var(--bg);
    }
    .page-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    h1 { font-size: 18px; margin: 0; }
    #uiLang { width: auto; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--surface); color: var(--text); }
    p.hint { color: var(--text-muted); font-size: 13px; line-height: 1.6; margin: 0 0 18px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 14px; background: #efefef; padding: 3px; border-radius: 10px; width: fit-content; }
    .tab {
      padding: 6px 18px; border: none; border-radius: 8px; background: transparent;
      font-size: 13.5px; font-family: inherit; color: var(--text-muted); cursor: pointer;
    }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    label.field { display: block; font-size: 13px; color: #555; margin: 16px 0 5px; font-weight: 600; }
    label.field:first-child { margin-top: 0; }
    input[type="text"], input[type="password"], select {
      width: 100%; padding: 9px 11px;
      border: 1px solid var(--border); border-radius: 9px;
      font-size: 14px; background: var(--surface); color: var(--text);
      outline: none; transition: border-color .15s;
    }
    input:focus, select:focus { border-color: #c8d6f5; }

    /* 开关 */
    .toggle-row { display: flex; align-items: center; gap: 12px; margin-top: 18px; }
    .toggle-row .desc { flex: 1; }
    .toggle-row .desc b { display: block; font-size: 13.5px; font-weight: 600; }
    .toggle-row .desc span { display: block; font-size: 12px; color: var(--text-muted); margin-top: 2px; line-height: 1.5; }
    .switch { position: relative; width: 38px; height: 22px; flex: none; }
    .switch input { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
    .switch .track { position: absolute; inset: 0; background: #d9d9d9; border-radius: 11px; transition: background .15s; pointer-events: none; }
    .switch .track::after {
      content: ""; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px;
      background: #fff; border-radius: 50%; transition: transform .15s; box-shadow: 0 1px 2px rgba(0,0,0,.2);
    }
    .switch input:checked + .track { background: var(--accent); }
    .switch input:checked + .track::after { transform: translateX(16px); }

    /* 主题颜色行 */
    .color-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid #f3f3f3; }
    .color-row:last-of-type { border-bottom: none; }
    .color-row .desc { flex: 1; }
    .color-row .desc b { display: block; font-size: 13.5px; font-weight: 600; }
    .color-row .desc span { display: block; font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    input[type="color"] {
      width: 44px; height: 30px; padding: 2px; flex: none;
      border: 1px solid var(--border); border-radius: 8px; background: var(--surface); cursor: pointer;
    }

    .btns { margin-top: 22px; display: flex; gap: 10px; align-items: center; }
    button.action {
      padding: 9px 18px; border: none; border-radius: 9px; cursor: pointer;
      font-size: 14px; font-family: inherit;
    }
    #save { background: var(--accent); color: #fff; }
    #test, #resetTheme { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    #test:hover, #resetTheme:hover { background: #f5f5f5; }
    .autosave { font-size: 12px; color: var(--text-muted); }

    #status {
      margin-top: 16px; font-size: 13px; padding: 10px 12px; border-radius: 9px;
      display: none; white-space: pre-wrap; line-height: 1.5;
    }
    #status.ok { display: block; background: #f0faf2; color: #166534; border: 1px solid #d7f0dc; }
    #status.err { display: block; background: #fef1f1; color: var(--danger); border: 1px solid #fadcdc; }
    #status.info { display: block; background: #eff4ff; color: #1d4ed8; border: 1px solid #dce6fb; }
  </style>
</head>
<body>
  <div class="page-head">
    <h1 data-i18n="optTitle">设置</h1>
    <select id="uiLang"></select>
  </div>
  <p class="hint" data-i18n="optHint">配置模型服务商、界面主题与语言。</p>

  <div class="tabs">
    <button class="tab active" data-tab="model" data-i18n="tabModel">模型</button>
    <button class="tab" data-tab="theme" data-i18n="tabTheme">主题</button>
  </div>

  <!-- 模型 tab -->
  <div id="tab-model" class="tabpane">
    <div class="card">
      <label class="field" data-i18n="fProvider">服务商</label>
      <select id="provider"></select>

      <label class="field" data-i18n="fApiKey">API Key</label>
      <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />

      <label class="field" data-i18n="fBaseURL">Base URL（接口地址）</label>
      <input id="baseURL" type="text" placeholder="https://.../v1" />

      <label class="field" data-i18n="fModel">模型名（model）</label>
      <input id="model" type="text" placeholder="如 deepseek-chat" />

      <div class="toggle-row">
        <div class="desc">
          <b data-i18n="visionT">视觉</b>
          <span data-i18n="visionD">把网页截图发给模型，才能理解 Google Docs 等 canvas 页面。需选带「视觉」的模型。</span>
        </div>
        <span class="switch"><input type="checkbox" id="vision" /><span class="track"></span></span>
      </div>

      <div class="toggle-row">
        <div class="desc">
          <b data-i18n="dbgT">真实按键（debugger）</b>
          <span data-i18n="dbgD">发送受信任的键鼠事件，才能编辑 Google Docs 等应用。运行时浏览器顶部会出现"正在调试"提示条，属正常现象。</span>
        </div>
        <span class="switch"><input type="checkbox" id="useDebugger" /><span class="track"></span></span>
      </div>

      <div class="btns">
        <button id="save" class="action" data-i18n="btnSave">保存</button>
        <button id="test" class="action" data-i18n="btnTest">测试连接</button>
      </div>
      <div id="status"></div>
    </div>
  </div>

  <!-- 主题 tab -->
  <div id="tab-theme" class="tabpane" hidden>
    <div class="card">
      <div class="color-row">
        <div class="desc"><b data-i18n="thBgT">背景</b><span data-i18n="thBgD">面板与设置页的底色</span></div>
        <input type="color" id="th-bg" />
      </div>
      <div class="color-row">
        <div class="desc"><b data-i18n="thSurfaceT">表面</b><span data-i18n="thSurfaceD">卡片、输入框、消息气泡的底色</span></div>
        <input type="color" id="th-surface" />
      </div>
      <div class="color-row">
        <div class="desc"><b data-i18n="thTextT">文字</b><span data-i18n="thTextD">正文文字颜色</span></div>
        <input type="color" id="th-text" />
      </div>
      <div class="color-row">
        <div class="desc"><b data-i18n="thBorderT">边框</b><span data-i18n="thBorderD">卡片与输入框的描边</span></div>
        <input type="color" id="th-border" />
      </div>
      <div class="color-row">
        <div class="desc"><b data-i18n="thAccentT">强调色</b><span data-i18n="thAccentD">按钮、你的消息气泡、开关</span></div>
        <input type="color" id="th-accent" />
      </div>
      <div class="color-row">
        <div class="desc"><b data-i18n="thGlowT">光效颜色</b><span data-i18n="thGlowD">任务运行时网页四周的呼吸光晕</span></div>
        <input type="color" id="th-glow" />
      </div>

      <div class="btns">
        <button id="resetTheme" class="action" data-i18n="btnReset">恢复默认</button>
        <span class="autosave" data-i18n="autosaveNote">修改后即时保存并生效</span>
      </div>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
