<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <header>
    <span id="active-model" title="当前使用的模型">未配置</span>
    <button id="float" class="icon-btn" title="以浮窗打开（在当前网页上）">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <rect x="12" y="12" width="7" height="5" rx="1" fill="currentColor" stroke="none"/>
      </svg>
    </button>
    <button id="newchat" class="icon-btn" title="新对话（清空上下文）">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        <line x1="12" y1="7.5" x2="12" y2="12.5"/><line x1="9.5" y1="10" x2="14.5" y2="10"/>
      </svg>
    </button>
    <button id="settings" class="icon-btn" title="设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/>
        <line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/>
        <line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>
      </svg>
    </button>
  </header>

  <div id="log"></div>

  <div id="composer">
    <div id="attachments"></div>
    <textarea id="input" rows="2" placeholder="描述你想让浏览器做的事…"></textarea>
    <div class="composer-bar">
      <button id="attach" class="icon-btn" title="添加图片或文本文件">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <input type="file" id="file-input" multiple style="display:none" accept="image/*,.txt,.md,.csv,.json,.js,.ts,.py,.html,.css,.xml,.yaml,.yml,.log,.tsv" />
      <span class="hint" id="hint">Cmd+Enter 运行</span>
      <button id="run" class="send-btn" title="运行 (Cmd+Enter)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19V5"/><path d="M5 12l7-7 7 7"/>
        </svg>
      </button>
      <button id="stop" class="stop-btn" title="停止">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>
    </div>
  </div>

  <script type="module" src="panel.js"></script>
</body>
</html>
